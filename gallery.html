        /* Disable text selection */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        
        /* Disable image dragging */
        img {
            -webkit-user-drag: none;
            -khtml-user-drag: none;
            -moz-user-drag: none;
            -o-user-drag: none;
            user-drag: none;
            pointer-events: auto;
        }
        
        /* Additional protection for gallery items */
        .gallery-item {
            pointer-events: auto;
        }
        
        /* Prevent context menu on images */
        .gallery-item img {
            pointer-events: auto;
        }
        
        /* Fullscreen image protection */
        #fullImage {
            pointer-events: none;
        }
    </style>
</head>

<script>
// Disable right click globally
document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
});

// Disable image dragging
document.addEventListener('dragstart', function(e) {
    if (e.target.tagName === 'IMG') {
        e.preventDefault();
        return false;
    }
});

// Disable copy/paste shortcuts
function disableShortcuts(e) {
    var key = e.keyCode || e.which;
    
    // Disable Ctrl+S, Ctrl+C, Ctrl+V, Ctrl+P, Ctrl+U, Ctrl+Shift+I, F12
    if (e.ctrlKey && (key === 83 || key === 67 || key === 86 || key === 80 || key === 85)) {
        e.preventDefault();
        return false;
    }
    
    // Disable F12
    if (key === 123) {
        e.preventDefault();
        return false;
    }
    
    // Disable Ctrl+Shift+I
    if (e.ctrlKey && e.shiftKey && key === 73) {
        e.preventDefault();
        return false;
    }
    
    // Disable Print Screen (approximation)
    if (key === 44) {
        e.preventDefault();
        return false;
    }
    
    return true;
}

// Disable developer tools detection
(function() {
    var devtools = {
        open: false,
        orientation: null
    };
    
    var threshold = 160;
    
    var emitEvent = function() {
        if (devtools.open) {
            document.body.innerHTML = '<h1 style="text-align: center; margin-top: 50px;">Content Protected</h1>';
        }
    };
    
    setInterval(function() {
        if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
            devtools.open = true;
            emitEvent();
        } else {
            devtools.open = false;
        }
    }, 1000);
})();

function toggleMenu() {
    document.getElementById('menu').classList.toggle('active');
}

// Gallery Images Data
const images = [
    // Annual Day Images
    { src: "1.jpg", category: "annual" },
    { src: "2.jpg", category: "annual" },
    { src: "3.jpg", category: "annual" },
    { src: "4.jpg", category: "annual" },
    { src: "5.jpg", category: "annual" },
    { src: "6.jpg", category: "annual" },
    { src: "7.jpg", category: "annual" },
    { src: "8.jpg", category: "annual" },
    { src: "9.jpg", category: "annual" },
    
    // Republic Day Images
    { src: "rep1.jpg", category: "republic" },
    { src: "rep2.jpg", category: "republic" },
    { src: "rep3.jpg", category: "republic" },
    { src: "rep4.jpg", category: "republic" },
    { src: "rep5.jpg", category: "republic" },
    { src: "rep6.jpg", category: "republic" },
    { src: "rep7.jpg", category: "republic" },
    
    // Quiz Competition Images
    { src: "quiz1.jpg", category: "quiz" },
    { src: "quiz2.jpg", category: "quiz" },
    { src: "quiz3.jpg", category: "quiz" },
    { src: "quiz4.jpg", category: "quiz" },
    { src: "quiz5.jpg", category: "quiz" },
    { src: "quiz6.jpg", category: "quiz" },
    { src: "quiz7.jpg", category: "quiz" },
    { src: "quiz8.jpg", category: "quiz" },
    
    // Tour Images
    { src: "tour1.jpg", category: "tour" },
    { src: "tour2.jpg", category: "tour" },
    { src: "tour3.jpg", category: "tour" },
    { src: "tour4.jpg", category: "tour" },
    { src: "tour5.jpg", category: "tour" },
    { src: "tour6.jpg", category: "tour" },
    { src: "tour7.jpg", category: "tour" },
    { src: "tour8.jpg", category: "tour" },
    { src: "tour9.jpg", category: "tour" },
    { src: "tour10.jpg", category: "tour" },
    { src: "tour11.jpg", category: "tour" },
    { src: "tour12.jpg", category: "tour" },
    
    // Result Images
    { src: "res1.jpg", category: "result" },
    { src: "res2.jpg", category: "result" },
    { src: "res3.jpg", category: "result" },
    { src: "res4.jpg", category: "result" },
    { src: "res5.jpg", category: "result" },
    { src: "res6.jpg", category: "result" },
    { src: "res7.jpg", category: "result" },
    { src: "res8.jpg", category: "result" },
    { src: "res9.jpg", category: "result" },
    { src: "res10.jpg", category: "result" },
    { src: "res11.jpg", category: "result" },
    { src: "res12.jpg", category: "result" },
    { src: "res13.jpg", category: "result" },
    { src: "res14.jpg", category: "result" },
    { src: "res15.jpg", category: "result" },
    { src: "res16.jpg", category: "result" },
    { src: "res17.jpg", category: "result" },
    { src: "res18.jpg", category: "result" },
    { src: "res19.jpg", category: "result" }
];

const galleryGrid = document.getElementById('galleryGrid');
const buttons = document.querySelectorAll('.filter-buttons button');
const fullscreen = document.getElementById('fullscreen');
const fullImage = document.getElementById('fullImage');
const closeBtn = document.getElementById('close');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

let currentIndex = 0;
let filteredImages = [];

function displayImages(category) {
    galleryGrid.innerHTML = '';
    
    filteredImages = category === 'all' 
        ? images 
        : images.filter(img => img.category === category);
    
    filteredImages.forEach((img, index) => {
        const div = document.createElement('div');
        div.classList.add('gallery-item');
        div.innerHTML = `<img src="${img.src}" alt="Gallery Image" data-index="${index}" ondragstart="return false;" oncontextmenu="return false;">`;
        galleryGrid.appendChild(div);
    });
    
    // Add click event to images
    document.querySelectorAll('.gallery-item img').forEach(img => {
        img.addEventListener('click', function() {
            currentIndex = parseInt(this.dataset.index);
            fullImage.src = filteredImages[currentIndex].src;
            fullscreen.style.display = 'flex';
        });
    });
}

buttons.forEach(button => {
    button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        button.classList.add('active');
        displayImages(button.dataset.category);
    });
});

closeBtn.onclick = () => {
    fullscreen.style.display = 'none';
};

prevBtn.onclick = () => {
    currentIndex = (currentIndex - 1 + filteredImages.length) % filteredImages.length;
    fullImage.src = filteredImages[currentIndex].src;
};

nextBtn.onclick = () => {
    currentIndex = (currentIndex + 1) % filteredImages.length;
    fullImage.src = filteredImages[currentIndex].src;
};

// Keyboard navigation
document.addEventListener('keydown', (e) => {
    if (fullscreen.style.display === 'flex') {
        if (e.key === 'ArrowLeft') prevBtn.click();
        if (e.key === 'ArrowRight') nextBtn.click();
        if (e.key === 'Escape') closeBtn.click();
    }
});

// Initial display
displayImages('all');

// Additional protection for fullscreen image
fullImage.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    return false;
});

fullImage.addEventListener('dragstart', function(e) {
    e.preventDefault();
    return false;
});
</script>
